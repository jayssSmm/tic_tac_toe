<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="struct">
        <div id="TicTacToe">TIC TAC TOE</div>

        <div id="gameboard">
            <div id="title-1" class="title"></div>
            <div id="title-2" class="title"></div>
            <div id="title-3" class="title"></div>
            <div id="title-4" class="title"></div>
            <div id="title-5" class="title"></div>
            <div id="title-6" class="title"></div>
            <div id="title-7" class="title"></div>
            <div id="title-8" class="title"></div>
            <div id="title-9" class="title"></div>
        </div>

        <div class="ScoreBoard">
            <div class="masterScore">
                <div class="title">
                    <img src="icons/guava_11807818.png" alt="X" class="responsive-img">
                </div>
                <div class="title score">0</div>
            </div>
            <div class="masterScore">
                <div class="title">
                    <img src="icons/water-melon_7783973.png" alt="O" class="responsive-img">
                </div>
                <div class="title score">0</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
