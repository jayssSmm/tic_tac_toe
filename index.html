<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="struct">
        <div id="TicTacToe">TIC TAC TOE</div>

        <div id="gameboard">
            <div class="title card" id="1"></div>
            <div class="title card" id="2"></div>
            <div class="title card" id="3"></div>
            <div class="title card" id="4"></div>
            <div class="title card" id="5"></div>
            <div class="title card" id="6"></div>
            <div class="title card" id="7"></div>
            <div class="title card" id="8"></div>
            <div class="title card" id="9"></div>
        </div>

        <div class="ScoreBoard">
            <div class="masterScore">
                <div class="title">
                    <img src="icons/guava_11807818.png" alt="X" class="responsive-img">
                </div>
                <div class="title score" id="X">0</div>
            </div>
            <div class="masterScore">
                <div class="title">
                    <img src="icons/water-melon_7783973.png" alt="O" class="responsive-img">
                </div>
                <div class="title score" id="O">0</div>
            </div>
        </div>

        <div class="score title" id="reset">RESET</div>

    </div>

    <script src="script.js"></script>
</body>
</html>
